services:
  postgres:
    image: postgres:15-alpine
    container_name: request-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: request_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: request-migrate
    volumes:
      - ./migrations:/migrations
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: request_db
      DB_SSLMODE: disable
    command: [
      "-path", "/migrations",
      "-database", "postgresql://postgres:postgres@postgres:5432/request_db?sslmode=disable",
      "up"
    ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build: .
    container_name: request-seed
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: request_db
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      migrate:
        condition: service_completed_successfully
    entrypoint: ["./seed"]
    restart: "no"

  app:
    build: .
    container_name: request-app
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: request_db
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data: