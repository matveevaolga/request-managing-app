name: Lint

on:
  push:
    branches: [ main, develop, feature/*, ci/cd-integration ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.64
          args: --timeout=5m
          only-new-issues: true